name: Generate Profile Stats

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      # 📊 Github Stats Card
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=bgreenwell&show_icons=true&theme=dracula
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}



      # 🦀 Rust Projects
      - name: Generate doxx Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=doxx&theme=dracula&hide_description=true
          path: profile/doxx.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate lstr Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=lstr&theme=dracula&hide_description=true
          path: profile/lstr.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate jotdown-rs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=jotdown-rs&theme=dracula&hide_description=true
          path: profile/jotdown-rs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate xleak Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=xleak&theme=dracula&hide_description=true
          path: profile/xleak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🐹 Go Projects
      - name: Generate git-ego Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=git-ego&theme=dracula&hide_description=true
          path: profile/git-ego.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📊 R Packages (CRAN)
      - name: Generate fastshap Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=fastshap&theme=dracula&hide_description=true
          path: profile/fastshap.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pdp Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=pdp&theme=dracula&hide_description=true
          path: profile/pdp.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate vip Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=koalaverse&repo=vip&theme=dracula&hide_description=true
          path: profile/vip.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sure Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=koalaverse&repo=sure&theme=dracula&hide_description=true
          path: profile/sure.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate investr Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=investr&theme=dracula&hide_description=true
          path: profile/investr.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ebm Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=ebm&theme=dracula&hide_description=true
          path: profile/ebm.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate statlingua Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bgreenwell&repo=statlingua&theme=dracula&hide_description=true
          path: profile/statlingua.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile badges & stats [skip ci]" || exit 0
          git push
